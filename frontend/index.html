<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bite for Byte Chat</title>
  <style>
    :root {
      --bg-1: #f7fff0;
      --bg-2: #fff7e8;
      --leaf: #3f7d20;
      --leaf-deep: #275011;
      --fruit: #ff7a59;
      --fruit-2: #ffb347;
      --card: rgba(255, 255, 255, 0.93);
      --text: #1f2a16;
      --muted: #617052;
      --line: #d5e5c7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 12%, rgba(255, 122, 89, 0.35) 0, transparent 18%),
        radial-gradient(circle at 88% 16%, rgba(255, 179, 71, 0.35) 0, transparent 20%),
        radial-gradient(circle at 12% 82%, rgba(84, 168, 65, 0.32) 0, transparent 21%),
        radial-gradient(circle at 84% 80%, rgba(63, 125, 32, 0.3) 0, transparent 19%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      width: min(1000px, 100%);
      border: 2px solid var(--line);
      border-radius: 20px;
      background: var(--card);
      box-shadow: 0 18px 50px rgba(33, 54, 18, 0.16);
      overflow: hidden;
    }

    .header {
      padding: 16px 20px;
      background: linear-gradient(90deg, var(--leaf), var(--leaf-deep));
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .header h1 { margin: 0; font-size: 1.25rem; letter-spacing: 0.3px; }
    .session { font-size: 0.84rem; opacity: 0.95; }

    .content { min-height: 540px; }
    .chat-pane { display: flex; flex-direction: column; }
    .messages { padding: 16px; overflow-y: auto; height: 390px; background: rgba(255, 255, 255, 0.8); }
    .msg { margin: 10px 0; padding: 10px 12px; border-radius: 12px; max-width: 90%; white-space: pre-wrap; }
    .user { margin-left: auto; background: #e8f6dd; border: 1px solid #cbe8b7; }
    .bot { margin-right: auto; background: #fff2e2; border: 1px solid #f8d7ae; }

    .composer { padding: 12px; border-top: 1px solid var(--line); display: grid; gap: 8px; }
    textarea {
      width: 100%;
      min-height: 84px;
      border: 1px solid #c8dcb8;
      border-radius: 10px;
      padding: 10px;
      resize: vertical;
      font: inherit;
    }

    .row { display: flex; gap: 8px; flex-wrap: wrap; }

    button {
      border: 0;
      border-radius: 10px;
      background: var(--leaf);
      color: #fff;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 600;
    }

    button.alt { background: #f37f4a; }
    button.gray { background: #64745a; }
    button.warn { background: #b41e1e; }

    .hint { color: var(--muted); font-size: 0.85rem; }

    .camera-wrap {
      margin-top: 8px;
      border: 1px dashed #b8d4a6;
      border-radius: 10px;
      padding: 8px;
      background: #fcfff9;
      display: none;
    }

    #barcodeVideo {
      width: 100%;
      border-radius: 8px;
      background: #000;
    }

    #barcodeCanvas {
      display: none;
    }

    @media (max-width: 900px) {
      .messages { height: 330px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Bite for Byte</h1>
      <div class="session" id="sessionLabel"></div>
    </div>

    <div class="content">
      <section class="chat-pane">
        <div class="messages" id="messages"></div>
        <div class="composer">
          <textarea id="message" placeholder="Ask about a food product..."></textarea>
          <div class="row">
            <button id="actionBtn" class="alt">Actions</button>
            <button id="cameraBtn">Camera</button>
          </div>
          <p class="hint" id="micStatus">Press Enter to send. Shift+Enter for a new line.</p>

          <div class="camera-wrap" id="cameraPanel">
            <video id="barcodeVideo" autoplay playsinline muted></video>
            <canvas id="barcodeCanvas"></canvas>
            <div class="row" style="margin-top:8px;">
              <button id="captureBtn">Capture & Analyze</button>
              <button id="uploadBtn" class="gray">Upload Image</button>
              <button id="closeCameraBtn" class="warn">Close Camera</button>
            </div>
          </div>
          <p class="hint" id="barcodeResult">Camera is off.</p>
        </div>
      </section>
    </div>
  </div>

  <script>
    const sessionKey = "bite_session_id";
    let sessionId = localStorage.getItem(sessionKey);
    if (!sessionId) {
      sessionId = crypto.randomUUID();
      localStorage.setItem(sessionKey, sessionId);
    }

    const sessionLabel = document.getElementById("sessionLabel");
    const messages = document.getElementById("messages");
    const messageInput = document.getElementById("message");
    const micStatus = document.getElementById("micStatus");
    const actionBtn = document.getElementById("actionBtn");
    const cameraBtn = document.getElementById("cameraBtn");
    const captureBtn = document.getElementById("captureBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const closeCameraBtn = document.getElementById("closeCameraBtn");
    const cameraPanel = document.getElementById("cameraPanel");

    const barcodeVideo = document.getElementById("barcodeVideo");
    const barcodeCanvas = document.getElementById("barcodeCanvas");
    let barcodeStream = null;

    let mediaRecorder = null;
    let chunks = [];
    let isRecording = false;

    sessionLabel.textContent = `Session: ${sessionId} (6h memory)`;

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = `msg ${role === "user" ? "user" : "bot"}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendChat() {
      const text = messageInput.value.trim();
      if (!text) return;
      addMessage(text, "user");
      messageInput.value = "";

      const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text, session_id: sessionId})
      });
      const data = await res.json();
      addMessage(data.reply || "No reply", "assistant");
    }

    function pickFile(accept = "image/*", captureMode = "") {
      return new Promise((resolve) => {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = accept;
        if (captureMode) input.setAttribute("capture", captureMode);
        input.onchange = () => resolve(input.files && input.files[0] ? input.files[0] : null);
        input.click();
      });
    }

    async function sendAudioBlobToSTT(blob) {
      const form = new FormData();
      form.append("file", blob, "mic.webm");
      const res = await fetch("/voice/stt", { method: "POST", body: form });
      const data = await res.json();
      if (data.text) {
        messageInput.value = data.text;
        messageInput.focus();
      }
      micStatus.textContent = "Transcription ready. Press Enter to send.";
    }
    console.log("Initialized mic recording and barcode scanning scripts.");
    async function toggleMicRecording() {
      if (!isRecording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          chunks = [];
          mediaRecorder = new MediaRecorder(stream);

          mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) chunks.push(event.data);
          };

          mediaRecorder.onstop = async () => {
            const blob = new Blob(chunks, { type: "audio/webm" });
            stream.getTracks().forEach((t) => t.stop());
            await sendAudioBlobToSTT(blob);
          };

          mediaRecorder.start();
          isRecording = true;
          micStatus.textContent = "Listening... click Actions again to stop.";
        } catch (e) {
          micStatus.textContent = "Microphone permission denied or unavailable.";
        }
      } else {
        mediaRecorder.stop();
        isRecording = false;
        micStatus.textContent = "Transcribing...";
      }
    }

    async function getImageInsight(fileOrBlob) {
      const question = messageInput.value.trim() || "Identify this image and provide useful food or product insights.";
      const form = new FormData();
      form.append("file", fileOrBlob, "image.jpg");
      form.append("question", question);

      const res = await fetch("/image/qa", { method: "POST", body: form });
      const data = await res.json();
      addMessage(data.answer || "No insight available.", "assistant");
    }

    async function getBarcodeInsight(codes) {
      const brief = codes.map(c => `${c.type}: ${c.value}`).join(", ");
      addMessage(`Barcode detected: ${brief}`, "assistant");

      const prompt = `I scanned barcode data (${brief}). Give short product insights and what to check before buying.`;
      const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: prompt, session_id: sessionId})
      });
      const data = await res.json();
      addMessage(data.reply || "No insight available.", "assistant");
    }

    async function analyzeImageInput(fileOrBlob) {
      const out = document.getElementById("barcodeResult");
      out.textContent = "Analyzing image...";

      const barcodeForm = new FormData();
      barcodeForm.append("file", fileOrBlob, "scan.jpg");
      const barcodeRes = await fetch("/image/barcode", { method: "POST", body: barcodeForm });
      const barcodeData = await barcodeRes.json();

      if (barcodeData.status === "ok" && barcodeData.codes && barcodeData.codes.length > 0) {
        out.textContent = "Barcode detected.";
        await getBarcodeInsight(barcodeData.codes);
        return;
      }

      out.textContent = "No barcode detected. Running image insight.";
      await getImageInsight(fileOrBlob);
    }

    async function openCamera() {
      try {
        barcodeStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false,
        });
        barcodeVideo.srcObject = barcodeStream;
        cameraPanel.style.display = "block";
        document.getElementById("barcodeResult").textContent = "Camera is on. Capture or upload an image.";
      } catch (e) {
        document.getElementById("barcodeResult").textContent = "Camera unavailable.";
      }
    }

    function closeCamera() {
      if (barcodeStream) {
        barcodeStream.getTracks().forEach((t) => t.stop());
        barcodeStream = null;
      }
      barcodeVideo.srcObject = null;
      cameraPanel.style.display = "none";
      document.getElementById("barcodeResult").textContent = "Camera is off.";
    }

    async function captureAndAnalyze() {
      if (!barcodeStream) {
        document.getElementById("barcodeResult").textContent = "Open camera first.";
        return;
      }

      const w = barcodeVideo.videoWidth || 1280;
      const h = barcodeVideo.videoHeight || 720;
      barcodeCanvas.width = w;
      barcodeCanvas.height = h;
      const ctx = barcodeCanvas.getContext("2d");
      ctx.drawImage(barcodeVideo, 0, 0, w, h);

      const blob = await new Promise((resolve) => barcodeCanvas.toBlob(resolve, "image/jpeg", 0.95));
      if (!blob) {
        document.getElementById("barcodeResult").textContent = "Failed to capture frame.";
        return;
      }
      await analyzeImageInput(blob);
    }

    async function uploadAndAnalyze() {
      const file = await pickFile("image/*,.jpg,.jpeg,.png,.webp,.heic,.heif", "environment");
      if (!file) return;
      await analyzeImageInput(file);
    }

    async function handleAction() {
      if (isRecording) {
        await toggleMicRecording();
        return;
      }

      const choice = window.prompt(
        "Choose action:\n1) Mic start\n2) New session"
      );

      if (choice === "1") {
        await toggleMicRecording();
        return;
      }

      if (choice === "2") {
        sessionId = crypto.randomUUID();
        localStorage.setItem(sessionKey, sessionId);
        sessionLabel.textContent = `Session: ${sessionId} (6h memory)`;
        messages.innerHTML = "";
        messageInput.value = "";
        micStatus.textContent = "Press Enter to send. Shift+Enter for a new line.";
        closeCamera();
      }
    }

    actionBtn.addEventListener("click", handleAction);
    cameraBtn.addEventListener("click", openCamera);
    captureBtn.addEventListener("click", captureAndAnalyze);
    uploadBtn.addEventListener("click", uploadAndAnalyze);
    closeCameraBtn.addEventListener("click", closeCamera);

    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendChat();
      }
    });

    window.addEventListener("beforeunload", closeCamera);
  </script>
</body>
</html>
